<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tạo mật khẩu | Rivière Restaurant</title>
    <link rel="stylesheet" href="../static/css/style.css" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="auth-shell">
    <div class="auth-card wide">
        <div class="auth-copy">
            <span class="section-tag">Google Onboarding</span>
            <h1>Hoàn tất tài khoản Rivière</h1>
            <p>
                Tài khoản Google của bạn đã được xác thực.
                Hãy bổ sung số điện thoại và tạo mật khẩu để hoàn tất tài khoản.
            </p>
        </div>

        <div class="auth-form-wrap">
            <form class="auth-form" th:action="@{/set-password}" method="post" th:object="${setPasswordRequest}">
                <h2>Bổ sung thông tin</h2>

                <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}">Lỗi</div>
                <div class="alert info" th:if="${infoMessage}" th:text="${infoMessage}">Thông báo</div>
                <div class="alert info">Email: <strong th:text="${pendingEmail}">google@gmail.com</strong></div>

                <label>Số điện thoại
                    <input type="text" th:field="*{phone}" placeholder="Nhập số điện thoại" required/>
                </label>
                <div class="helper-text error-text" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}">Lỗi số điện thoại</div>

                <label>Mật khẩu mới
                    <input type="password" th:field="*{password}" placeholder="Tối thiểu 6 ký tự" required/>
                </label>
                <div class="helper-text error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Lỗi mật khẩu</div>

                <label>Xác nhận mật khẩu
                    <input type="password" th:field="*{confirmPassword}" placeholder="Nhập lại mật khẩu" required/>
                </label>
                <div class="helper-text error-text" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Lỗi xác nhận</div>

                <button type="submit" class="btn btn-primary full-width">Hoàn tất tạo tài khoản</button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
