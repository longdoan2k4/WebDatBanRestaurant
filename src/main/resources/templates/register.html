<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng ký | Rivière Restaurant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../static/css/style.css" th:href="@{/css/style.css}"/>
    <style>
        body.auth-luxury { margin: 0; min-height: 100vh; background: #0a0705; }
        .auth-luxury-bg { position: fixed; inset: 0; z-index: 0; background: url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat; }
        .auth-luxury-bg::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(10,7,5,0.88) 0%, rgba(10,7,5,0.72) 50%, rgba(30,20,10,0.82) 100%); }
        .auth-luxury-wrap { position: relative; z-index: 2; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 80px 20px 40px; }
        .auth-glass { width: 100%; max-width: 480px; background: rgba(15,10,7,0.70); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid rgba(212,175,55,0.22); border-radius: 24px; padding: 44px 40px; box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04) inset; }
        .auth-logo { text-align: center; margin-bottom: 28px; }
        .auth-logo-icon { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg,#d4af37,#aa7c11); display: inline-flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond',serif; font-size: 1.6rem; color: #1a140b; font-weight: 700; margin-bottom: 10px; }
        .auth-brand { font-family:'Cormorant Garamond',serif; color:#d4af37; font-size:1.05rem; letter-spacing:2px; text-transform:uppercase; display:block; }
        .auth-title { font-family:'Cormorant Garamond',serif; color:#d4af37; font-size:1.9rem; font-weight:700; text-align:center; margin:0 0 28px; letter-spacing:0.04em; }
        .auth-glass label { display:block; font-family:'Manrope',sans-serif; font-size:0.78rem; color:rgba(243,228,205,0.55); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
        .auth-input { width:100%; box-sizing:border-box; background:rgba(255,255,255,0.04); border:1px solid rgba(212,175,55,0.25); border-radius:10px; padding:12px 16px; font-family:'Manrope',sans-serif; font-size:0.95rem; color:#f0e4cc; outline:none; transition:border-color .2s,box-shadow .2s; margin-bottom:4px; }
        .auth-input::placeholder { color:rgba(243,228,205,0.3); }
        .auth-input:focus { border-color:#d4af37; box-shadow:0 0 0 3px rgba(212,175,55,0.15); }
        .auth-field-error { font-family:'Manrope',sans-serif; font-size:0.8rem; color:#e05555; margin-bottom:14px; }
        .auth-btn-primary { display:block; width:100%; padding:13px; background:linear-gradient(90deg,#c9a227,#d4af37,#c9a227); color:#1a120b; font-family:'Manrope',sans-serif; font-weight:700; font-size:0.92rem; letter-spacing:1.5px; text-transform:uppercase; border:none; border-radius:10px; cursor:pointer; transition:opacity .2s,box-shadow .2s; box-shadow:0 4px 20px rgba(212,175,55,0.3); margin-top:8px; }
        .auth-btn-primary:hover { opacity:.88; box-shadow:0 6px 28px rgba(212,175,55,0.45); }
        .auth-helper { font-family:'Manrope',sans-serif; font-size:0.85rem; color:rgba(243,228,205,0.5); text-align:center; margin-top:18px; }
        .auth-helper a { color:#d4af37; text-decoration:none; font-weight:500; }
        .auth-helper a:hover { text-decoration:underline; }
        .auth-glass .alert { border-radius:10px; margin-bottom:16px; font-family:'Manrope',sans-serif; font-size:0.88rem; }
    </style>
</head>
<body class="auth-luxury">
<div class="auth-luxury-bg"></div>

<div class="auth-luxury-wrap">
    <div class="auth-glass">
        <div class="auth-logo">
            <div class="auth-logo-icon">R</div>
            <span class="auth-brand">Rivière Restaurant</span>
        </div>

        <h2 class="auth-title">Đăng Ký Tài Khoản</h2>

        <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <label>Họ và tên</label>
            <input class="auth-input" type="text" th:field="*{fullName}" placeholder="Nhập họ và tên"/>
            <div class="auth-field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>

            <label>Số điện thoại</label>
            <input class="auth-input" type="text" th:field="*{phone}" placeholder="Nhập số điện thoại"/>
            <div class="auth-field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>

            <label>Mật khẩu</label>
            <input class="auth-input" type="password" th:field="*{password}" placeholder="Tối thiểu 6 ký tự"/>
            <div class="auth-field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

            <label>Xác nhận mật khẩu</label>
            <input class="auth-input" type="password" th:field="*{confirmPassword}" placeholder="Nhập lại mật khẩu"/>
            <div class="auth-field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>

            <button type="submit" class="auth-btn-primary">Tạo tài khoản</button>
        </form>

        <p class="auth-helper">Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a></p>
    </div>
</div>
</body>
</html>
