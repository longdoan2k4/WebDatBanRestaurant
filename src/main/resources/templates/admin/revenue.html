<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý doanh thu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-page {
            padding: 32px;
            max-width: 1280px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card, .panel-card {
            background: #fff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .stat-label {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .filter-form input,
        .filter-form select,
        .filter-form button {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 15px;
        }

        .filter-form button {
            background: #111827;
            color: white;
            border: none;
            cursor: pointer;
        }

        .chart-wrap {
            position: relative;
            min-height: 380px;
        }
        .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    margin-bottom: 20px;
    border-radius: 12px;
    background: #111827;
    color: #ffffff;
    text-decoration: none;
    font-weight: 600;
    transition: 0.2s ease;
}

.back-btn:hover {
    background: #1f2937;
    transform: translateY(-1px);
}
    </style>
</head>
<body>
<div class="admin-page">
    <h1 class="page-title">Quản lý doanh thu</h1>
    <a th:href="@{/admin/dashboard}" class="back-btn">← Quay lại trang admin</a>

    <div class="panel-card" style="margin-bottom: 24px;">
        <div class="panel-title">Bộ lọc thống kê</div>
        <form class="filter-form" th:action="@{/admin/revenue}" method="get">
            <div class="filter-grid">
                <div>
                    <label>Chọn ngày</label>
                    <input type="date" name="date" th:value="${selectedDate}">
                </div>
                <div>
                    <label>Chọn tháng</label>
                    <select name="month">
                        <option th:each="m : ${#numbers.sequence(1,12)}"
                                th:value="${m}"
                                th:text="${'Tháng ' + m}"
                                th:selected="${m == selectedMonth}"></option>
                    </select>
                </div>
                <div>
                    <label>Chọn năm</label>
                    <select name="year">
                        <option th:each="y : ${#numbers.sequence(2024, 2035)}"
                                th:value="${y}"
                                th:text="${y}"
                                th:selected="${y == selectedYear}"></option>
                    </select>
                </div>
                <div style="align-self:end;">
                    <label>&nbsp;</label>
                    <button type="submit">Xem thống kê</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card-grid">
        <div class="stat-card">
            <div class="stat-label">Doanh thu ngày</div>
            <div class="stat-value" th:text="${#numbers.formatDecimal(dailyRevenue, 0, 'COMMA', 0, 'POINT') + ' đ'}">0 đ</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">Số đơn đã thanh toán trong ngày</div>
            <div class="stat-value" th:text="${dailyPaidBookings}">0</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">Doanh thu tháng</div>
            <div class="stat-value" th:text="${#numbers.formatDecimal(monthlyRevenue, 0, 'COMMA', 0, 'POINT') + ' đ'}">0 đ</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">Số đơn đã thanh toán trong tháng</div>
            <div class="stat-value" th:text="${monthlyPaidBookings}">0</div>
        </div>
    </div>

    <div class="panel-card">
        <div class="panel-title"
             th:text="${'Biểu đồ doanh thu từng ngày trong tháng ' + selectedMonth + '/' + selectedYear}">
            Biểu đồ doanh thu
        </div>
        <div class="chart-wrap">
            <canvas id="revenueChart"></canvas>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const revenueStats = /*[[${revenueByDaysInMonth}]]*/ [];

    const labels = revenueStats.map(item => 'Ngày ' + item.day);
    const values = revenueStats.map(item => Number(item.revenue));

    const ctx = document.getElementById('revenueChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Doanh thu (VND)',
                data: values,
                borderWidth: 1,
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: true
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) {
                            return value.toLocaleString('vi-VN') + ' đ';
                        }
                    }
                }
            }
        }
    });
</script>
</body>
</html>
