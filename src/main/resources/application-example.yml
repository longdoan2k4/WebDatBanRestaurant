spring:
  datasource:
    url: jdbc:mysql://localhost:3307/restaurant_pro_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: your_db_username
    password: your_db_password
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: your_google_client_id
            client-secret: your_google_client_secret
            scope:
              - openid
              - profile
              - email
  mail:
    host: your_smtp_host
    port: your_smtp_port
    username: your_mail_username
    password: your_mail_app_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
app:
  otp:
    expiry-minutes: 5
  mail:
    from-address: your_mail_from_address
    from-name: Restaurant Pro

server:
  port: 8089

payment:
  vnpay:
    enabled: true
    tmn-code: your_vnpay_tmn_code
    hash-secret: your_vnpay_hash_secret
    pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    refund-api-url: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction
    return-url: http://localhost:8089/payment/vnpay-return
    order-type: other
    locale: vn
    expire-minutes: 15
